<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Дом Москва</title>

<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">

<style>
  html, body { height:100%; margin:0; }
  #panorama { width:100%; height:100%; }
</style>
</head>

<body>
<div id="panorama"></div>

<script>

    hotSpots: [

      { pitch: 0, yaw: -45, type: "info", text: "Санузел-1", sceneId: "scene-3" }

  },
  "scene-2": {

    autoLoad: true,
    hotSpots: [
      { pitch: 0, yaw: -180, type: "info", text: "Прихожая-1", sceneId: "scene-1" },
      { pitch: 0, yaw: -156, type: "info", text: "Санузел-1", sceneId: "scene-3" },
      { pitch: 0, yaw: -100, type: "info", text: "Кабинет", sceneId: "scene-4" },
      { pitch: 0, yaw: 75, type: "info", text: "Коридор", sceneId: "scene-6" },
      { pitch: 0, yaw: 0, type: "info", text: "Гостиная-1", sceneId: "scene-5" }
    ]
  },
"scene-3": {
    title: "Санузел-1",
    type: "equirectangular",
    panorama: "3.jpg",
    autoLoad: true,
    hotSpots: [
      { pitch: 0, yaw: 135, type: "info", text: "Прихожая-1", sceneId: "scene-1" }
    ]
  },
"scene-4": {
    title: "Кабинет",
    type: "equirectangular",
    panorama: "4.jpg",
    autoLoad: true,
    hotSpots: [
      { pitch: 0, yaw: -100, type: "info", text: "Прихожая-2", sceneId: "scene-2" }
    ]
},
  "scene-5": {
    title: "Гостиная-1",
    type: "equirectangular",
    panorama: "5.jpg",
    autoLoad: true,
    hotSpots: [
      { pitch: 0, yaw: 0, type: "info", text: "Гостиная-2", sceneId: "scene-7" },
      { pitch: 0, yaw: 50, type: "info", text: "Прихожая-2", sceneId: "scene-2" }
    ]
  },
   "scene-7": {
    title: "Гостиная-2",
    type: "equirectangular",
    panorama: "7.jpg",
    autoLoad: true,
    hotSpots: [
      { pitch: 0, yaw: 0, type: "info", text: "Гостиная-1", sceneId: "scene-5" },
      { pitch: 0, yaw: -40, type: "info", text: "Прихожая-2", sceneId: "scene-2" }
    ]
  },
   "scene-6": {
    title: "Коридор",
    type: "equirectangular",
    panorama: "6.jpg",
    autoLoad: true,
    hotSpots: [
      { pitch: -30, yaw: +100, type: "info", text: "Прихожая-2", sceneId: "scene-2" },
      { pitch: 0, yaw: +20, type: "info", text: "Детская-1", sceneId: "scene-8" },
      { pitch: 0, yaw: -20, type: "info", text: "Детская-2", sceneId: "scene-9" },
      { pitch: 0, yaw: +160, type: "info", text: "Санузел-2", sceneId: "scene-10" },
      { pitch: 0, yaw: -150, type: "info", text: "Спальня", sceneId: "scene-12" }
    ]
  },

    hotSpots: [

    ]
  },

    title: "Детская-2",
    type: "equirectangular",
    panorama: "9.jpg",
    autoLoad: true,

      { pitch: 0, yaw: -180, type: "info", text: "Коридор", sceneId: "scene-6" }
    ]
  },
   "scene-10": {
    title: "Санузел-2",
    type: "equirectangular",
    panorama: "10.jpg",
    autoLoad: true,
    hotSpots: [
      { pitch: 0, yaw: 140, type: "info", text: "Санузел-2.2", sceneId: "scene-11" },
      { pitch: 0, yaw: -160, type: "info", text: "Коридор", sceneId: "scene-6" }
    ]
  },
   "scene-11": {
    title: "Санузел-2.2",
    type: "equirectangular",
    panorama: "11.jpg",

    type: "equirectangular",

    autoLoad: true,
    hotSpots: [
      { pitch: 0, yaw: 150, type: "info", text: "Спальня-2", sceneId: "scene-13" },

    ]
  },
   "scene-13": {
    title: "Спальня-2",
    type: "equirectangular",
    panorama: "13.jpg",
    autoLoad: true,
    hotSpots: [
      { pitch: 0, yaw: 70, type: "info", text: "Спальня", sceneId: "scene-12" }
    ]
  }
};

const viewer = pannellum.viewer('panorama', {
  default: { firstScene: 'scene-1' },
  scenes
});

viewer.on('hotSpotClick', function (e, id, args) {
  if (args && args.sceneId) viewer.loadScene(args.sceneId);
});
</script>
</body>
</html>
